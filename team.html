<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Team Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;

        padding: 0;

        box-sizing: border-box;

        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;

        background: linear-gradient(135deg, #060b26, #0d1b45, #091540);

        color: white;

        overflow-x: hidden;

        padding: 25px;
      }

      body::before {
        content: "";

        position: fixed;

        width: 450px;

        height: 450px;

        background: rgba(108, 140, 255, 0.16);

        border-radius: 50%;

        top: -120px;

        left: -120px;

        filter: blur(120px);

        z-index: -1;
      }

      body::after {
        content: "";

        position: fixed;

        width: 450px;

        height: 450px;

        background: rgba(255, 90, 170, 0.12);

        border-radius: 50%;

        bottom: -120px;

        right: -120px;

        filter: blur(120px);

        z-index: -1;
      }

      .container {
        width: 100%;

        max-width: 900px;

        margin: auto;
      }

      .top-bar {
        display: flex;

        justify-content: space-between;

        align-items: center;

        flex-wrap: wrap;

        gap: 15px;

        margin-bottom: 30px;
      }

      #teamTitle {
        font-size: 42px;

        font-weight: 700;
      }

      .live-tag {
        background: rgba(255, 255, 255, 0.08);

        padding: 10px 18px;

        border-radius: 999px;

        color: #cfd7ff;

        font-size: 14px;

        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .auction-card {
        padding: 45px;

        border-radius: 28px;

        background: rgba(255, 255, 255, 0.06);

        backdrop-filter: blur(18px);

        border: 1px solid rgba(255, 255, 255, 0.08);

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);

        text-align: center;

        margin-bottom: 30px;
      }

      #playerName {
        font-size: 52px;

        margin-bottom: 15px;

        font-weight: 700;
      }

      #currentBid {
        font-size: 30px;

        color: #8db8ff;

        margin-bottom: 10px;
      }

      #highestBidder {
        font-size: 22px;

        color: #d4dcff;

        margin-bottom: 35px;
      }

      .timer {
        width: 140px;

        height: 140px;

        border-radius: 50%;

        margin: auto;

        display: flex;

        justify-content: center;

        align-items: center;

        font-size: 42px;

        font-weight: 700;

        background: radial-gradient(circle, #6a7dff, #4b56d2);

        box-shadow: 0 10px 35px rgba(108, 140, 255, 0.35);

        margin-bottom: 35px;
      }

      .bid-buttons {
        display: flex;

        justify-content: center;

        flex-wrap: wrap;

        gap: 18px;
      }

      .bid-buttons button {
        padding: 16px 32px;

        border: none;

        border-radius: 18px;

        background: linear-gradient(135deg, #6a7dff, #8b5cff);

        color: white;

        font-size: 17px;

        font-weight: 600;

        cursor: pointer;

        transition: 0.3s;

        min-width: 160px;
      }

      .bid-buttons button:hover {
        transform: translateY(-3px);

        box-shadow: 0 10px 25px rgba(108, 140, 255, 0.35);
      }

      .team-info {
        padding: 30px;

        border-radius: 24px;

        background: rgba(255, 255, 255, 0.05);

        backdrop-filter: blur(16px);

        border: 1px solid rgba(255, 255, 255, 0.08);

        text-align: center;
      }

      .team-info h2 {
        font-size: 34px;

        margin-bottom: 15px;
      }

      #teamPurse {
        color: #8db8ff;
      }

      .wallet-icon {
        font-size: 45px;

        margin-bottom: 10px;
      }

      @media (max-width: 768px) {
        body {
          padding: 18px;
        }

        #teamTitle {
          font-size: 34px;
        }

        #playerName {
          font-size: 34px;
        }

        #currentBid {
          font-size: 24px;
        }

        .timer {
          width: 110px;

          height: 110px;

          font-size: 34px;
        }

        .bid-buttons button {
          width: 100%;
        }

        .auction-card {
          padding: 30px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="top-bar">
        <h1 id="teamTitle">Team</h1>

        <div class="live-tag">LIVE TEAM BIDDING</div>
      </div>

      <div class="auction-card">
        <h2 id="playerName">Waiting...</h2>

        <h3 id="currentBid">Current Bid: 0</h3>

        <h3 id="highestBidder">Highest Bidder: None</h3>

        <div class="timer" id="timer">--</div>

        <div class="bid-buttons">
          <button id="bid10">+10</button>

          <button id="bid50">+50</button>

          <button id="bid100">+100</button>
        </div>
      </div>

      <div class="team-info">
        <div class="wallet-icon">💰</div>

        <h2>
          Purse:
          <span id="teamPurse"> 0 </span>
        </h2>
      </div>
    </div>

    <script type="module" src="./js/team.js"></script>
  </body>
</html>
