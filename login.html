<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bit Wars Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;

        padding: 0;

        box-sizing: border-box;

        font-family: "Poppins", sans-serif;
      }

      body {
        width: 100%;

        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        background: linear-gradient(135deg, #060b26, #111c44, #091540);

        overflow: hidden;

        position: relative;
      }

      body::before {
        content: "";

        position: absolute;

        width: 500px;

        height: 500px;

        background: rgba(90, 120, 255, 0.25);

        border-radius: 50%;

        top: -120px;

        left: -120px;

        filter: blur(120px);
      }

      body::after {
        content: "";

        position: absolute;

        width: 500px;

        height: 500px;

        background: rgba(255, 90, 170, 0.18);

        border-radius: 50%;

        bottom: -120px;

        right: -120px;

        filter: blur(120px);
      }

      .login-container {
        width: 420px;

        padding: 45px 35px;

        border-radius: 24px;

        background: rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(18px);

        border: 1px solid rgba(255, 255, 255, 0.1);

        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);

        z-index: 10;

        text-align: center;
      }

      .logo {
        font-size: 58px;

        margin-bottom: 12px;
      }

      .title {
        font-size: 38px;

        font-weight: 700;

        color: white;

        margin-bottom: 8px;
      }

      .subtitle {
        color: #b6c2ff;

        font-size: 15px;

        margin-bottom: 35px;
      }

      .input-group {
        margin-bottom: 22px;

        text-align: left;
      }

      .input-group label {
        display: block;

        margin-bottom: 8px;

        color: #dfe6ff;

        font-size: 14px;

        font-weight: 500;
      }

      .input-group input {
        width: 100%;

        padding: 15px 18px;

        border-radius: 14px;

        border: none;

        outline: none;

        background: rgba(255, 255, 255, 0.08);

        color: white;

        font-size: 15px;

        transition: 0.3s;
      }

      .input-group input:focus {
        background: rgba(255, 255, 255, 0.13);

        box-shadow: 0 0 0 2px #6c8cff;
      }

      .input-group input::placeholder {
        color: #aab3d9;
      }

      .login-btn {
        width: 100%;

        padding: 15px;

        border: none;

        border-radius: 14px;

        background: linear-gradient(135deg, #6a7dff, #8b5cff);

        color: white;

        font-size: 16px;

        font-weight: 600;

        cursor: pointer;

        transition: 0.3s;
      }

      .login-btn:hover {
        transform: translateY(-2px);

        box-shadow: 0 8px 25px rgba(108, 140, 255, 0.35);
      }

      .footer-text {
        margin-top: 22px;

        color: #9da8d6;

        font-size: 13px;
      }

      .auction-tag {
        display: inline-block;

        margin-bottom: 18px;

        padding: 8px 16px;

        border-radius: 999px;

        background: rgba(255, 255, 255, 0.08);

        color: #c9d3ff;

        font-size: 13px;

        letter-spacing: 1px;
      }

      @media (max-width: 500px) {
        .login-container {
          width: 92%;

          padding: 35px 25px;
        }

        .title {
          font-size: 30px;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="auction-tag">LIVE AUCTION SYSTEM</div>

      <div class="logo">⚔️</div>

      <h1 class="title">Bit Wars</h1>

      <p class="subtitle">Secure login for Host and Team Captains</p>

      <div class="input-group">
        <label> Email </label>

        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="input-group">
        <label> Password </label>

        <input
          type="password"
          id="password"
          placeholder="Enter your password"
        />
      </div>

      <button id="loginBtn" class="login-btn">Login</button>

      <p class="footer-text">Realtime Multiplayer Auction Platform</p>
    </div>

    <script type="module" src="./js/login.js"></script>
  </body>
</html>
