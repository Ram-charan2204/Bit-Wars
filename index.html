<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bit Wars</title>

    <style>
      * {
        margin: 0;

        padding: 0;

        box-sizing: border-box;
      }

      body {
        width: 100%;

        height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        background: linear-gradient(135deg, #060b26, #111c44, #091540);

        font-family: Arial, sans-serif;

        color: white;
      }

      .loader {
        text-align: center;
      }

      .loader h1 {
        font-size: 42px;

        margin-bottom: 20px;
      }

      .loader p {
        color: #bfc8ff;

        font-size: 18px;
      }

      .spinner {
        width: 60px;

        height: 60px;

        border: 6px solid rgba(255, 255, 255, 0.2);

        border-top: 6px solid #6c8cff;

        border-radius: 50%;

        margin: 0 auto 25px;

        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="loader">
      <div class="spinner"></div>

      <h1>Bit Wars</h1>

      <p>Checking authentication...</p>
    </div>

    <script type="module">
      import { app } from "./Js/firebase-config.js";

      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      const auth = getAuth(app);

      onAuthStateChanged(auth, (user) => {
        if (user) {
          const email = user.email;

          if (email === "ramcharancherry338@gmail.com") {
            window.location.href = "host.html";
          } else if (email === "rishicherry015@gmail.com") {
            window.location.href = "team.html?team=teamA";
          } else if (email === "ramcharancherry2204@gmail.com") {
            window.location.href = "team.html?team=teamB";
          } else if (email === "rkyadav7981@gmail.com") {
            window.location.href = "team.html?team=teamC";
          } else {
            window.location.href = "login.html";
          }
        } else {
          window.location.href = "login.html";
        }
      });
    </script>
  </body>
</html>
