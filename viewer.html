<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bit Wars Viewer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;

        padding: 0;

        box-sizing: border-box;

        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;

        background: linear-gradient(135deg, #060b26, #0d1b45, #091540);

        color: white;

        padding: 25px;
      }

      .container {
        max-width: 1500px;

        margin: auto;
      }

      .header {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-bottom: 30px;

        flex-wrap: wrap;

        gap: 15px;
      }

      .header h1 {
        font-size: 42px;
      }

      .live-badge {
        padding: 10px 18px;

        border-radius: 999px;

        background: rgba(255, 255, 255, 0.08);

        color: #cfd7ff;
      }

      .main-grid {
        display: grid;

        grid-template-columns: 2fr 1fr;

        gap: 25px;
      }

      .auction-card,
      .history-card,
      .team-card {
        background: rgba(255, 255, 255, 0.06);

        border: 1px solid rgba(255, 255, 255, 0.08);

        border-radius: 28px;

        padding: 30px;

        backdrop-filter: blur(18px);
      }

      #playerName {
        font-size: 48px;

        margin-bottom: 15px;
      }

      #currentBid {
        font-size: 30px;

        color: #8db8ff;

        margin-bottom: 10px;
      }

      #highestBidder {
        font-size: 24px;

        margin-bottom: 25px;
      }

      .timer {
        width: 130px;

        height: 130px;

        border-radius: 50%;

        background: radial-gradient(circle, #6a7dff, #4b56d2);

        display: flex;

        justify-content: center;

        align-items: center;

        margin: auto;

        font-size: 38px;

        font-weight: 700;
      }

      .teams-grid {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

        gap: 20px;

        margin-top: 25px;
      }

      .team-card h2 {
        margin-bottom: 10px;
      }

      .team-card ul {
        list-style: none;

        margin-top: 15px;
      }

      .team-card li {
        padding: 10px;

        border-radius: 10px;

        background: rgba(255, 255, 255, 0.06);

        margin-bottom: 10px;
      }

      .history-list {
        max-height: 700px;

        overflow-y: auto;

        margin-top: 20px;
      }

      .history-item {
        padding: 12px;

        margin-bottom: 12px;

        border-radius: 12px;

        background: rgba(255, 255, 255, 0.06);
      }

      .sold-modal {
        position: fixed;

        inset: 0;

        background: rgba(0, 0, 0, 0.85);

        display: none;

        justify-content: center;

        align-items: center;

        z-index: 9999;
      }

      .sold-box {
        width: 90%;

        max-width: 500px;

        padding: 40px;

        border-radius: 30px;

        background: linear-gradient(135deg, #101b4d, #16245f);

        text-align: center;
      }

      .hammer-img {
        width: 180px;

        margin-bottom: 20px;
      }

      @media (max-width: 1000px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>👀 Audience View</h1>

        <div class="live-badge">LIVE AUCTION</div>
      </div>

      <div class="main-grid">
        <div>
          <div class="auction-card">
            <h2 id="playerName">Waiting...</h2>

            <h3 id="currentBid">Current Bid: 0</h3>

            <h3 id="highestBidder">Highest Bidder: None</h3>

            <div class="timer" id="timer">--</div>
          </div>

          <div class="teams-grid" id="teamsContainer"></div>
        </div>

        <div class="history-card">
          <h2>📜 Live History</h2>

          <div class="history-list" id="historyList"></div>
        </div>
      </div>
    </div>

    <div id="soldModal" class="sold-modal">
      <div class="sold-box">
        <img src="./Assets/hammer.gif" class="hammer-img" />

        <h1>🔨 SOLD 🔨</h1>

        <h2 id="soldPlayer"></h2>

        <h3 id="soldTeam"></h3>

        <h3 id="soldPrice"></h3>
      </div>
    </div>

    <script type="module" src="./js/viewer.js"></script>
  </body>
</html>
